<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
        rel="stylesheet"
        type="text/css">
  <link rel="stylesheet"
        href="style.css"
        media="screen"
        charset="utf-8">
</head>
<body>
  <header class="header">
    <img class="header__img" src="./eisenhower-matrix.jpg" alt="eisenhower-matrix" />
    <a class="more-inf"
       href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>
  <main class="main">
    <section id="top-section">
      <label for="new-task" class="h3 add-item__label">
        Add Item
      </label>
      <div class="task-row">
        <input id="new-task" class="top-section__task-input" type="text">
        <button class="add-button">Add</button>
      </div>
    </section>
      <section id="to-do-section">
        <h3 class="h3">Todo</h3>
        <ul id="incomplete-tasks">
          <li class="li">
            <input type="checkbox" class="checkbox">
            <label class="task-label">
              Pay Bills
            </label>
            <input type="text" class="task-input">
            <button class="edit">
              Edit
            </button>
            <button class="delete">
              <img class="delete__img" src="./remove.svg" alt="delete-button-icon">
            </button>
          </li>
          <li class="edit-mode li">
            <input type="checkbox" class="checkbox">
            <label class="task-label">
              Go Shopping
            </label>
            <input type="text" value="Go Shopping" class="task-input">
            <button class="edit">
              Save
            </button>
            <button class="delete">
              <img class="delete__img" src="./remove.svg" alt="delete-button-icon">
            </button>
          </li>
        </ul>
      </section>
    <section id="completed-tasks-section">
      <h3 class="h3">Completed</h3>
      <ul id="completed-tasks">
        <li class="li task-label_completed">
          <input type="checkbox" class="checkbox" checked>
          <label class="task-label">
            See the Doctor
          </label>
          <input type="text" class="task-input">
          <button class="edit">
            Edit
          </button>
          <button class="delete">
            <img class="delete__img" src="./remove.svg" alt="delete-button-icon">
          </button>
        </li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
