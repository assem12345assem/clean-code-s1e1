<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
        rel="stylesheet"
        type="text/css">
  <link rel="stylesheet"
        href="style.css"
        media="screen">

</head>
<body>
  <header class="header">
    <img class="header__img" src="./eisenhower-matrix.jpg" alt="eisenhower-matrix">
    <a class="header__link"
       href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>
  <main class="main">
    <div id="top-section">
      <label for="top-section__new-task" class="top-section__task-label">
        Add Item
      </label>
      <div class="top-section__form">
        <input id="top-section__new-task" class="top-section__task-input" type="text">
        <button class="top-section__add-button">Add</button>
      </div>
    </div>
    <section id="to-do-section">
      <h3 class="to-do-section__title">Todo</h3>
      <ul id="to-do-section__tasks">
        <li class="task-item">
          <input type="checkbox" class="checkbox">
          <label for="pay-bills-task" class="task-label">
            Pay Bills
          </label>
          <input id="pay-bills-task" type="text" class="task-input">
          <button class="edit-button">
            Edit
          </button>
          <button class="delete-button">
            <img class="delete-button__img" src="./remove.svg" alt="delete button">
          </button>
        </li>
        <li class="edit-mode task-item">
          <input type="checkbox" class="checkbox">
          <label for="shopping-task" class="task-label">
            Go Shopping
          </label>
          <input id="shopping-task" type="text" value="Go Shopping" class="task-input">
          <button class="edit-button">
            Save
          </button>
          <button class="delete-button">
            <img class="delete-button__img" src="./remove.svg" alt="delete button">
          </button>
        </li>
      </ul>
    </section>
    <section id="completed-tasks-section">
      <h3 class="completed-tasks-section__title">Completed</h3>
      <ul id="completed-tasks">
        <li class="task-item completed-mode">
          <input type="checkbox" class="checkbox" checked>
          <label for="see-doctor-task" class="task-label">
            See the Doctor
          </label>
          <input id="see-doctor-task" type="text" class="task-input">
          <button class="edit-button">
            Edit
          </button>
          <button class="delete-button">
            <img class="delete-button__img" src="./remove.svg" alt="delete button">
          </button>
        </li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
