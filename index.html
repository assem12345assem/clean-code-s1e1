<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css" media="screen">
  </head>
  <body class="body">
    <header class="header">
      <img src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix" class="header__img">
      <a
        class="header__more_inf"
        href="https://goal-life.com/page/method/matrix-eisenhower"
        >Want more details?
      </a>
    </header>
    <main class="main">
      <div id="top-section">
        <label for="new-task" class="top-section__h3">Add Item</label>
        <div class="top-section__task-row">
          <input id="new-task" class="task-input" type="text"><button class="add-button">Add</button>
        </div>
      </div>
      <section id="incomplete-section">
        <h3 class="incomplete-section__h3">Todo</h3>
        <ul id="incomplete-section__tasks">
          <li class="list-item">
            <input type="checkbox" class="checkbox-input"><label class="task-label">Pay Bills</label>
            <input type="text" class="task-input">
            <button class="edit-button">Edit</button>
            <button class="delete-button"><img class="delete-button__img" src="./remove.svg" alt="remove button"></button>
          </li>
          <li class="edit-mode list-item">
            <input type="checkbox" class="checkbox-input"><label class="task-label">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task-input">
            <button class="edit-button">Save</button>
            <button class="delete-button"><img class="delete-button__img" src="./remove.svg" alt="remove-button"></button>
          </li>
        </ul>
      </section>
      <section id="completed-section">
        <h3 class="completed-section__h3">Completed</h3>
        <ul id="completed-section__tasks">
          <li class="list-item">
            <input type="checkbox" checked class="checkbox-input"><label class="task-label">See the Doctor</label>
            <input type="text" class="task-input">
            <button class="edit-button">Edit</button>
            <button class="delete-button"><img class="delete-button__img" src="./remove.svg" alt="remove button"></button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
